server {
    listen 80;
    server_name api.roondal.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.roondal.co.kr;

    # SSL 인증서 설정 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.roondal.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.roondal.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # /apps/ 정적 파일 서빙
    location /apps/ {
        alias /usr/local/web_source/api.roondal.co.kr/apps/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # 나머지 요청은 FastAPI(uvicorn)로 프록시
    location / {
        proxy_pass http://127.0.0.1:8000;

        # 프록시 헤더
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 버퍼 설정
        proxy_buffering off;
    }

    # 로그 설정
    access_log /var/log/nginx/api.roondal.co.kr_access.log;
    error_log  /var/log/nginx/api.roondal.co.kr_error.log;

    # 요청 크기 제한
    client_max_body_size 10M;
}
